<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIÈRE — AI Beauty Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garabold:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-hover: #1a1a1a;
      --gold: #c9a96e;
      --gold-light: #e0c88a;
      --gold-dark: #a8873f;
      --text: #e8e8e8;
      --text-muted: #888;
      --serif: 'Cormorant Garamond', 'Georgia', serif;
      --sans: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(201,169,110,0.15);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-decoration: none;
      position: relative;
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    nav { display: flex; gap: 32px; align-items: center; }

    nav a {
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
      position: relative;
    }

    nav a:hover, nav a.active {
      color: var(--gold);
    }

    nav a.active::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--gold);
    }

    nav a.premium-link {
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.4);
      padding: 8px 20px;
      border-radius: 2px;
      transition: all 0.3s;
    }

    nav a.premium-link:hover {
      background: rgba(201,169,110,0.1);
      border-color: var(--gold);
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 80px 32px 60px;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero h1 {
      font-family: var(--serif);
      font-size: 3.2rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 40px auto;
    }

    /* ── Gallery Grid ── */
    .gallery-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }

    .section-title {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--gold-light);
      margin-bottom: 8px;
    }

    .section-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 40px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.04);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(201,169,110,0.06);
    }

    .gallery-item .img-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.3) 40%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
    }

    .gallery-item:hover .overlay { opacity: 1; }

    .overlay .img-title {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .overlay .img-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 2px;
      text-decoration: none;
      width: fit-content;
    }

    .btn-download:hover {
      background: var(--gold);
      color: var(--bg);
    }

    .btn-download svg { width: 14px; height: 14px; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 32px;
      width: 48px;
      height: 48px;
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .lightbox-close:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .lightbox-download {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 40px 32px;
      text-align: center;
    }

    .footer-logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--gold);
      margin-bottom: 12px;
    }

    footer p {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--gold);
      text-decoration: none;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header-inner { padding: 14px 20px; }
      .logo { font-size: 1.5rem; letter-spacing: 0.25em; }
      nav { gap: 16px; }
      nav a { font-size: 0.72rem; }
      .hero { padding: 50px 20px 40px; }
      .hero h1 { font-size: 2rem; }
      .gallery-section { padding: 0 16px 60px; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
      .overlay { padding: 16px; }
      .overlay .img-title { font-size: 0.9rem; }
    }

    @media (max-width: 480px) {
      nav a:not(.premium-link) { display: none; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .gallery-item {
      animation: fadeInUp 0.6s ease forwards;
      opacity: 0;
    }

    .gallery-item:nth-child(1) { animation-delay: 0.05s; }
    .gallery-item:nth-child(2) { animation-delay: 0.1s; }
    .gallery-item:nth-child(3) { animation-delay: 0.15s; }
    .gallery-item:nth-child(4) { animation-delay: 0.2s; }
    .gallery-item:nth-child(5) { animation-delay: 0.25s; }
    .gallery-item:nth-child(6) { animation-delay: 0.3s; }
    .gallery-item:nth-child(7) { animation-delay: 0.35s; }
    .gallery-item:nth-child(8) { animation-delay: 0.4s; }
    .gallery-item:nth-child(9) { animation-delay: 0.45s; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">LUMIÈRE</a>
      <nav>
        <a href="index.html" class="active">Gallery</a>
        <a href="premium.html" class="premium-link">✦ Premium</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1>Free Gallery</h1>
    <p>AIが生み出す美の世界。すべての作品を無料でダウンロードいただけます。</p>
    <div class="divider"></div>
  </section>

  <!-- Gallery -->
  <section class="gallery-section">
    <h2 class="section-title">Collection</h2>
    <p class="section-subtitle">FREE DOWNLOAD — CLICK TO PREVIEW</p>
    <div class="gallery-grid" id="gallery"></div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img src="" alt="" id="lightbox-img">
    <a class="btn-download lightbox-download" id="lightbox-dl" href="#" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </a>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-logo">LUMIÈRE</div>
    <p>&copy; 2026 LUMIÈRE. All images are AI-generated.</p>
    <p style="margin-top: 8px;"><a href="premium.html">Premium Collection →</a></p>
  </footer>

  <script>
    // ─── Sample gallery data ───
    // Replace `src` values with your actual image paths (e.g. "images/free/001.jpg")
    const galleryData = [
      { id: 1, title: 'Ethereal Glow',      tag: 'Portrait',  src: '' },
      { id: 2, title: 'Midnight Bloom',     tag: 'Fashion',   src: '' },
      { id: 3, title: 'Crystal Dawn',       tag: 'Portrait',  src: '' },
      { id: 4, title: 'Velvet Shadow',      tag: 'Artistic',  src: '' },
      { id: 5, title: 'Golden Hour',        tag: 'Portrait',  src: '' },
      { id: 6, title: 'Silk & Light',       tag: 'Fashion',   src: '' },
      { id: 7, title: 'Aurora Dream',       tag: 'Fantasy',   src: '' },
      { id: 8, title: 'Noir Elegance',      tag: 'Artistic',  src: '' },
      { id: 9, title: 'Luminous',           tag: 'Portrait',  src: '' },
    ];

    // ─── Placeholder SVG generator ───
    function placeholderSVG(title, idx) {
      const hues = [35, 28, 42, 20, 50, 32, 45, 25, 38];
      const h = hues[idx % hues.length];
      return `data:image/svg+xml,${encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
          <rect width="600" height="800" fill="hsl(${h}, 25%, 14%)"/>
          <rect x="150" y="200" width="300" height="300" rx="150" fill="hsl(${h}, 30%, 22%)" opacity="0.6"/>
          <text x="300" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="hsl(${h}, 45%, 55%)" opacity="0.8">${title}</text>
          <text x="300" y="620" text-anchor="middle" font-family="sans-serif" font-size="14" fill="hsl(${h}, 20%, 40%)">LUMIÈRE</text>
        </svg>
      `)}`;
    }

    // ─── Render gallery ───
    const grid = document.getElementById('gallery');

    galleryData.forEach((item, i) => {
      const imgSrc = item.src || placeholderSVG(item.title, i);
      const card = document.createElement('div');
      card.className = 'gallery-item';
      card.innerHTML = `
        <div class="img-wrapper">
          <img src="${imgSrc}" alt="${item.title}" loading="lazy">
          <div class="overlay">
            <span class="img-title">${item.title}</span>
            <span class="img-meta">${item.tag} — #${String(item.id).padStart(3,'0')}</span>
            <a class="btn-download" href="${imgSrc}" download="${item.title.replace(/\s+/g,'_')}.png" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download
            </a>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openLightbox(imgSrc, item.title));
      grid.appendChild(card);
    });

    // ─── Lightbox ───
    const lightbox    = document.getElementById('lightbox');
    const lbImg       = document.getElementById('lightbox-img');
    const lbDl        = document.getElementById('lightbox-dl');
    const lbClose     = document.getElementById('lightbox-close');

    function openLightbox(src, title) {
      lbImg.src = src;
      lbImg.alt = title;
      lbDl.href = src;
      lbDl.download = title.replace(/\s+/g, '_') + '.png';
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>
</html>
